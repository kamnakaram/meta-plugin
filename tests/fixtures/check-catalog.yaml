# Canonical catalog of every Meta audit check ID.
#
# This file is the single source of truth the eval harness uses to enforce:
#   1. Every check ID listed here MUST have a row in meta-ads/references/meta-audit.md
#      (no orphan catalog entries).
#   2. Every check ID with a row in that reference file MUST appear here
#      (no untracked checks).
#
# Update this file when adding or removing a check. The corresponding
# pytest in tests/audit/test_check_coverage.py will fail on drift.
#
# ID convention (from meta-ads/references/scoring-system.md):
#   - Sequential IDs (M01..M40): original checks
#   - Hyphenated IDs (M-AN1, M-CR1..4, M-ST1/2, M-AT1, M-IA1, M-TH1): v1.5+ additions
#   - All checks are Meta-specific (M = Meta)

